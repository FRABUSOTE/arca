<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#3B82F6" />
<title>Arca</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

:root{

  --blue-1:#3B82F6;
  --blue-2:#2563EB;
  --blue-3:#1D4ED8;
  --blue-soft:#DBEAFE;

  --bg:#F8FBFF;
  --surface:#FFFFFF;
  --surface-2:#F3F7FD;

  --text:#0F172A;
  --text-soft:#64748B;

  --shadow:
  0 10px 40px rgba(37,99,235,.10);

  --shadow-soft:
  0 2px 12px rgba(0,0,0,.05);

  --radius:24px;
}

html,
body{
  height:100%;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

.screen{
  display:none;
  height:100vh;
  flex-direction:column;
}

.screen.active{
  display:flex;
}

/* =========================
AUTH
========================= */

#authScreen{
  position:relative;
  overflow:hidden;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
  radial-gradient(circle at top left,
  rgba(59,130,246,.15),
  transparent 30%),

  radial-gradient(circle at bottom right,
  rgba(37,99,235,.12),
  transparent 35%),

  linear-gradient(
  180deg,
  #F8FBFF 0%,
  #EFF6FF 100%);
}

.auth-card{
  width:100%;
  max-width:390px;
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.6);
  border-radius:32px;
  padding:38px 28px;
  box-shadow:
  0 20px 60px rgba(37,99,235,.12);
}

.auth-logo{
  text-align:center;
  margin-bottom:34px;
}

.logo-icon{
  width:72px;
  height:72px;
  margin:auto;
  border-radius:24px;

  background:
  linear-gradient(
  135deg,
  var(--blue-1),
  var(--blue-2),
  var(--blue-3));

  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:#fff;

  box-shadow:
  0 10px 30px rgba(59,130,246,.35);

  margin-bottom:16px;
}

.auth-logo h1{
  font-family:'Playfair Display',serif;
  font-size:36px;
  color:var(--text);
}

.auth-logo p{
  color:var(--text-soft);
  margin-top:6px;
  font-size:13px;
  letter-spacing:.06em;
}

.auth-tabs{
  display:flex;
  background:#EDF4FF;
  padding:5px;
  border-radius:16px;
  margin-bottom:22px;
}

.auth-tab{
  flex:1;
  border:none;
  background:transparent;
  padding:12px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  color:#7A8CA8;
  transition:.25s;
}

.auth-tab.active{
  background:linear-gradient(
  135deg,
  var(--blue-1),
  var(--blue-2));

  color:#fff;
  box-shadow:
  0 4px 16px rgba(59,130,246,.28);
}

.form-group{
  margin-bottom:16px;
}

.form-label{
  display:block;
  margin-bottom:8px;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#7A8CA8;
}

.form-input{
  width:100%;
  border:none;
  outline:none;

  background:#F7FAFF;

  border:1px solid #E5EEF9;

  padding:15px 16px;

  border-radius:16px;

  font-size:15px;

  transition:.2s;
}

.form-input:focus{
  border-color:#93C5FD;
  box-shadow:
  0 0 0 4px rgba(59,130,246,.08);
}

.btn-primary{
  width:100%;
  border:none;
  cursor:pointer;

  margin-top:8px;

  padding:16px;

  border-radius:18px;

  font-weight:700;
  font-size:15px;

  color:#fff;

  background:
  linear-gradient(
  135deg,
  var(--blue-1),
  var(--blue-2),
  var(--blue-3));

  box-shadow:
  0 10px 24px rgba(37,99,235,.25);

  transition:.18s ease;
}

.btn-primary:hover{
  transform:translateY(-2px);
}

.btn-primary:active{
  transform:scale(.98);
}

/* =========================
APP
========================= */

#appScreen{
  background:var(--bg);
}

/* =========================
TOPBAR
========================= */

.topbar{
  min-height:72px;

  display:flex;
  align-items:center;
  gap:12px;

  padding:16px 18px;

  background:
  linear-gradient(
  135deg,
  var(--blue-1) 0%,
  var(--blue-2) 55%,
  var(--blue-3) 100%
  );

  color:#fff;

  position:relative;
  z-index:20;

  backdrop-filter:blur(20px);

  box-shadow:
  0 6px 24px rgba(37,99,235,.22);
}

.topbar::after{
  content:'';
  position:absolute;
  inset:0;

  background:
  linear-gradient(
  180deg,
  rgba(255,255,255,.08),
  transparent);

  pointer-events:none;
}

.topbar-logo{
  font-family:'Playfair Display',serif;
  font-size:25px;
  letter-spacing:.03em;
}

.topbar-btn{
  width:40px;
  height:40px;

  border:none;

  border-radius:14px;

  background:rgba(255,255,255,.15);

  color:#fff;

  cursor:pointer;

  font-size:18px;

  backdrop-filter:blur(12px);

  transition:.18s;
}

.topbar-btn:active{
  transform:scale(.94);
}

/* =========================
SEARCH
========================= */

.search-bar{
  padding:14px 16px;
  background:transparent;
}

.search-input-wrap{
  display:flex;
  align-items:center;
  gap:10px;

  background:rgba(255,255,255,.8);

  border:1px solid rgba(255,255,255,.7);

  backdrop-filter:blur(18px);

  padding:0 16px;

  border-radius:18px;

  box-shadow:
  0 6px 20px rgba(0,0,0,.04);
}

.search-input-wrap span{
  color:#60A5FA;
}

.search-input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  padding:14px 0;
  font-size:14px;
}

/* =========================
CHATS
========================= */

.chats-list{
  flex:1;
  overflow-y:auto;
  padding:0 10px 120px;
}

.chat-item{
  display:flex;
  align-items:center;
  gap:14px;

  margin-bottom:10px;

  padding:14px;

  border-radius:22px;

  background:rgba(255,255,255,.75);

  border:1px solid rgba(255,255,255,.7);

  backdrop-filter:blur(16px);

  box-shadow:
  0 4px 18px rgba(0,0,0,.04);

  cursor:pointer;

  transition:
  transform .15s ease,
  background .15s ease;
}

.chat-item:active{
  transform:scale(.98);
  background:#F3F8FF;
}

.chat-avatar{
  width:54px;
  height:54px;
  border-radius:18px;

  background:
  linear-gradient(
  135deg,
  var(--blue-1),
  var(--blue-2));

  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:700;
  font-size:20px;

  box-shadow:
  0 8px 20px rgba(37,99,235,.24);
}

.chat-name{
  font-weight:700;
  font-size:15px;
}

.chat-preview{
  margin-top:4px;
  color:#7A8CA8;
  font-size:13px;
}

/* =========================
FAB
========================= */

.fab{
  position:absolute;
  right:24px;
  bottom:92px;

  width:62px;
  height:62px;

  border:none;
  cursor:pointer;

  border-radius:22px;

  color:#fff;

  font-size:28px;
  font-weight:300;

  background:
  linear-gradient(
  135deg,
  rgba(59,130,246,.95),
  rgba(37,99,235,.95));

  backdrop-filter:blur(20px);

  box-shadow:
  0 14px 30px rgba(37,99,235,.30);

  transition:.18s;
}

.fab:active{
  transform:scale(.94);
}

/* =========================
CHAT
========================= */

#chatView{
  background:

  radial-gradient(circle at top left,
  rgba(59,130,246,.05),
  transparent 30%),

  radial-gradient(circle at bottom right,
  rgba(37,99,235,.06),
  transparent 30%),

  linear-gradient(
  180deg,
  #F8FBFF 0%,
  #EEF5FF 100%);
}

.messages-area{
  flex:1;
  overflow-y:auto;
  padding:18px 14px 20px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg-bubble{
  max-width:78%;
  display:flex;
  flex-direction:column;
}

.msg-bubble.out{
  align-self:flex-end;
}

.msg-bubble.in{
  align-self:flex-start;
}

.msg-content{
  padding:13px 16px;
  border-radius:22px;
  font-size:15px;
  line-height:1.5;
  word-break:break-word;
}

.msg-bubble.out .msg-content{
  color:#fff;

  background:
  linear-gradient(
  135deg,
  var(--blue-1),
  var(--blue-2));

  border-bottom-right-radius:6px;

  box-shadow:
  0 8px 24px rgba(59,130,246,.28);
}

.msg-bubble.in .msg-content{
  background:#fff;
  color:var(--text);

  border-bottom-left-radius:6px;

  box-shadow:
  0 2px 14px rgba(0,0,0,.06);
}

/* =========================
INPUT
========================= */

.input-bar{
  display:flex;
  align-items:flex-end;
  gap:10px;

  padding:14px 16px;

  background:rgba(255,255,255,.75);

  backdrop-filter:blur(20px);

  border-top:1px solid rgba(255,255,255,.6);
}

.msg-input-wrap{
  flex:1;

  display:flex;
  align-items:flex-end;
  gap:8px;

  background:#fff;

  border-radius:24px;

  padding:8px 14px;

  box-shadow:
  0 4px 18px rgba(0,0,0,.05);
}

.msg-input{
  flex:1;
  border:none;
  outline:none;
  resize:none;

  background:transparent;

  font-family:'DM Sans',sans-serif;

  font-size:15px;

  max-height:120px;
}

.send-btn{
  width:50px;
  height:50px;

  border:none;
  cursor:pointer;

  border-radius:18px;

  color:#fff;
  font-size:18px;

  background:
  linear-gradient(
  135deg,
  var(--blue-1),
  var(--blue-2));

  box-shadow:
  0 8px 20px rgba(59,130,246,.28);

  transition:.18s;
}

.send-btn:active{
  transform:scale(.94);
}

/* =========================
PROFILE
========================= */

.profile-hero{
  background:rgba(255,255,255,.75);

  border:1px solid rgba(255,255,255,.7);

  backdrop-filter:blur(18px);

  border-radius:32px;

  padding:34px 22px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.04);
}

.profile-big-avatar{
  width:92px;
  height:92px;

  margin:auto auto 14px;

  border-radius:28px;

  background:
  linear-gradient(
  135deg,
  var(--blue-1),
  var(--blue-2));

  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:36px;
  font-weight:700;

  box-shadow:
  0 12px 30px rgba(37,99,235,.25);
}

.profile-name{
  text-align:center;
  font-size:22px;
  font-weight:700;
}

.profile-username{
  text-align:center;
  color:var(--blue-1);
  margin-top:6px;
  font-weight:600;
}

#profileEmail{
  text-align:center;
}

/* =========================
BOTTOM NAV
========================= */

.bottom-nav{
  display:flex;

  background:rgba(255,255,255,.72);

  backdrop-filter:blur(20px);

  border-top:1px solid rgba(255,255,255,.7);

  padding:10px 0 calc(10px + env(safe-area-inset-bottom));
}

.nav-item{
  flex:1;

  border:none;
  background:transparent;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;

  cursor:pointer;

  color:#94A3B8;

  transition:.2s;
}

.nav-item.active{
  color:var(--blue-1);
}

.nav-icon{
  font-size:22px;
}

.nav-label{
  font-size:11px;
  font-weight:600;
}

/* =========================
MODAL
========================= */

.modal-overlay{
  position:fixed;
  inset:0;

  background:rgba(15,23,42,.4);

  backdrop-filter:blur(10px);

  display:none;
  align-items:flex-end;
  justify-content:center;

  z-index:100;
}

.modal-overlay.active{
  display:flex;
}

.modal-sheet{
  width:100%;
  max-width:500px;

  background:#fff;

  border-radius:34px 34px 0 0;

  padding:28px 24px 40px;

  animation:slideUp .25s ease;
}

@keyframes slideUp{
  from{
    transform:translateY(100%);
  }
  to{
    transform:translateY(0);
  }
}

.modal-handle{
  width:46px;
  height:5px;

  border-radius:10px;

  background:#D7E6FF;

  margin:auto auto 20px;
}

/* =========================
TOAST
========================= */

.toast{
  position:fixed;

  bottom:100px;
  left:50%;

  transform:translateX(-50%) translateY(20px);

  background:#0F172A;
  color:#fff;

  padding:12px 18px;

  border-radius:18px;

  font-size:13px;

  opacity:0;

  transition:.25s;

  z-index:200;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="screen active" id="authScreen">

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">⛵</div>
      <h1>Arca</h1>
      <p>Comunicación segura para familias</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active">Entrar</button>
      <button class="auth-tab">Registro</button>
    </div>

    <div class="form-group">
      <label class="form-label">Correo</label>
      <input class="form-input" placeholder="tu@correo.com">
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" type="password" placeholder="••••••••">
    </div>

    <button class="btn-primary">
      Entrar a Arca
    </button>

  </div>

</div>

<div class="screen" id="appScreen">

  <div class="topbar">
    <div class="topbar-logo">Arca</div>
    <div style="flex:1"></div>
    <button class="topbar-btn">👤</button>
  </div>

  <div class="view active">

    <div class="search-bar">

      <div class="search-input-wrap">
        <span>🔍</span>
        <input class="search-input" placeholder="Buscar conversación...">
      </div>

    </div>

    <div class="chats-list">

      <div class="chat-item">

        <div class="chat-avatar">
          M
        </div>

        <div style="flex:1">

          <div class="chat-name">
            Mamá
          </div>

          <div class="chat-preview">
            ¿Ya llegaste al colegio?
          </div>

        </div>

      </div>

      <div class="chat-item">

        <div class="chat-avatar">
          P
        </div>

        <div style="flex:1">

          <div class="chat-name">
            Papá
          </div>

          <div class="chat-preview">
            Avísame cuando salgas
          </div>

        </div>

      </div>

    </div>

    <button class="fab">＋</button>

  </div>

</div>

<script>

function showToast(message){

  const toast=document.getElementById('toast');

  toast.textContent=message;

  toast.classList.add('show');

  setTimeout(()=>{
    toast.classList.remove('show');
  },3000);
}

</script>

</body>
</html>
